<!DOCTYPE html>
<html lang="vi" xmlns="http://www.w3.org/1999/xhtml">
  {% include head.html %}
  <body>
    <style>
      .evk-page {
        font-family: 'Montserrat', 'Antic Slab', sans-serif;
        background: #1a222c;
        color: #c2cbd6;
        line-height: 1.7;
        min-height: 100vh;
      }
      .evk-page .evk-topbar {
        background: #1a222c;
        padding: 16px 20px;
        text-align: center;
        border-bottom: 1px solid #2a3440;
      }
      .evk-page .evk-topbar a { color: #fff; text-decoration: none; font-size: 20px; font-weight: 700; }
      .evk-page .evk-wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 60px; }
      .evk-page h1 { color: #ffffff; font-size: 32px; margin: 0 0 8px; padding: 0; }
      .evk-page h2 { color: #ffffff; font-size: 22px; margin: 30px 0 8px; padding: 0; }
      .evk-page p, .evk-page li { font-size: 17px; }
      .evk-page ul { padding-left: 24px; }
      .evk-page a { color: #6ab0ff; }
      .evk-page .evk-updated { color: #8a93a0; font-size: 15px; }
      .evk-footer {
        background: #1a222c; color: #aeb6c2; text-align: center;
        padding: 30px 20px; font-family: 'Montserrat', sans-serif; font-size: 14px;
        border-top: 1px solid #2a3440;
      }
      .evk-footer a { color: #cdd5e0; text-decoration: none; margin: 0 8px; }
      .evk-footer a:hover { color: #fff; text-decoration: underline; }
    </style>
    <div class="evk-page">
      <div class="evk-topbar">
        <a href="{{ '/' | relative_url }}">EVKey</a>
      </div>
      <div class="evk-wrap">
        {{ content }}
      </div>
    </div>
    <footer class="evk-footer">
      <p>
        <a href="{{ '/' | relative_url }}">Home</a> ·
        <a href="{{ '/privacy.html' | relative_url }}">Privacy Policy</a>
      </p>
      <p>&copy; EVKey — Vietnamese Keyboard for PC. Contact: lamquangminh10@gmail.com</p>
    </footer>
  </body>
</html>
